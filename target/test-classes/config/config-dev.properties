####################################################
# Environment
####################################################
environment=dev

####################################################
# Base URLs
####################################################
booker.base.url=https://restful-booker.herokuapp.com
grocery.base.url=https://simple-grocery-store-api.glitch.me

####################################################
# Authentication
####################################################
auth.username=admin
auth.password=password123
auth.type=cookie

####################################################
# Test Data
####################################################
json.folder=testdata/
schema.folder=schemas/
excel.folder=testdata/

####################################################
# Reports
####################################################
report.path=target/ExtentReport.html

####################################################
# Logging
####################################################
log.level=INFO

####################################################
# Timeout (Milliseconds)
####################################################
connection.timeout=30000
read.timeout=30000

####################################################
# Retry Configuration
####################################################
retry.count=2

####################################################
# Parallel Execution
####################################################
thread.count=3

####################################################
# Default Request Headers
####################################################
content.type=application/json
accept.type=application/json